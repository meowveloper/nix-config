# MangoWM Configuration

# Source
source = ~/.config/mango/colors.conf
source = ~/.config/mango/layout.conf
source = ~/.config/mango/visuals.conf
source = ~/.config/mango/bindings.conf

# Startup
exec-once = bash  ~/.config/mango/start-up.sh

tagrule=id:1,layout_name:scroller
tagrule=id:2,layout_name:scroller
tagrule=id:3,layout_name:scroller

layerrule=noblur:1,layer_name:selection
layerrule=noblur:1,layer_name:noctalia-notifications
layerrule=noblur:1,layer_name:noctalia-toast

windowrule=focused_opacity:0.8,unfocused_opacity:0.8,appid:dev.zed.Zed

source=~/.config/mango/noctalia.conf
