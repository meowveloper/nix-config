source = ~/.config/hypr/colors.conf

general {
    border_size = 2
    col.active_border = $primary
    col.inactive_border = $outline
    gaps_in = 4
    gaps_out = 4
    layout = scrolling
}


scrolling {
    column_width = 0.9
    direction = left
    fullscreen_on_one_column = false
    focus_fit_method = 0
}

decoration {
    active_opacity = 0.9
    inactive_opacity = 0.9
    rounding = 8
    rounding_power = 2
    shadow {
        enabled = false
    }

    blur {
        enabled = true
        size = 3
        passes = 2
        new_optimizations = yes
        ignore_opacity = true
    }
}

animations {
    # ... other animations
    animation = workspaces, 1, 5, default, slidevert
}
